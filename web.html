<!DOCTYPE html>
<html>
<head>
    <title>Simple Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
        }
        section {
            margin: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Simple Website</h1>
    </header>

    <section>
        <h2>Introduction</h2>
        <p>This is another basic web page using HTML and CSS.</p>
    </section>

    <section>
        <h2>Contact</h2>
        <p>Email: example@email.com</p>
    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
